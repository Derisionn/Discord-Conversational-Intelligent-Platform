services:
  - type: web
    name: discord-ingestion-bot
    runtime: python
    rootDir: ingestion-service
    buildCommand: pip install -r requirements.txt
    startCommand: python run_bot.py
    # For Render Free Tier
    plan: free
    healthCheckPath: /
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: discord_intel
      - key: HISTORY_LIMIT
        value: "5000"
